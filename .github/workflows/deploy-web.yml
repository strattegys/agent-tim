name: Deploy Command Central

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'agents/**'
      - 'Caddyfile'
      - 'docker-compose.yml'
      - 'docker/**'
      - 'scripts/**'
      - 'tools/**'
      - '.dockerignore'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # v5 runs the action on Node 24 (avoids Node 20 deprecation on checkout/setup-node).
      # node-version below stays 20 to match web/Dockerfile (node:20-alpine).
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: TypeScript check
        env:
          AUTH_SECRET: ci-github-actions-validate-only-not-for-deploy
        run: cd web && npx tsc --noEmit

      - name: Production build (matches Docker builder)
        env:
          AUTH_SECRET: ci-github-actions-validate-only-not-for-deploy
        run: cd web && npx next build

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Build and deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} bash -s <<'EOF'
          set -e
          cd /opt/agent-tim

          # Snapshot current UI source on disk before replacing (rollback / reference; prunes old tarballs).
          BACKUP_DIR=/opt/agent-tim/.deploy-backups/ui-snapshots
          mkdir -p "$BACKUP_DIR"
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          if [ -d web/app ]; then
            tar -czf "$BACKUP_DIR/web-ui-${STAMP}.tar.gz" \
              -C /opt/agent-tim \
              web/app web/components web/public 2>/dev/null || true
            echo "UI snapshot (pre-pull): $BACKUP_DIR/web-ui-${STAMP}.tar.gz"
          fi
          ( cd "$BACKUP_DIR" && ls -t web-ui-*.tar.gz 2>/dev/null | tail -n +21 | xargs -r rm -f ) || true

          # Pull latest code
          echo "Pulling latest code..."
          git fetch origin master
          git reset --hard origin/master

          echo "Refreshing web/.env.local from Bitwarden Secrets Manager..."
          if [ ! -s /root/.config/bws/access_token ]; then
            echo "ERROR: /root/.config/bws/access_token missing — add a Bitwarden machine account token (see docs/BITWARDEN-SECRETS.md)."
            exit 1
          fi
          if [ ! -s /root/.config/bws/project_id ]; then
            echo "ERROR: /root/.config/bws/project_id missing — one-line file: Secrets Manager project UUID."
            exit 1
          fi
          export BWS_ACCESS_TOKEN=$(cat /root/.config/bws/access_token)
          BWS_PID=$(tr -d '[:space:]' < /root/.config/bws/project_id)
          bash scripts/bws-pull-env.sh "$BWS_PID" web/.env.local
          chmod 600 web/.env.local

          if [ ! -f web/.env.local ]; then
            echo "ERROR: web/.env.local is missing after BWS pull."
            exit 1
          fi

          # Caddy must bind :80/:443. Host nginx/apache from the legacy stack often still holds them (deploy then fails with "address already in use").
          for svc in nginx apache2; do
            if systemctl is-active --quiet "$svc" 2>/dev/null; then
              echo "Stopping host $svc so Docker Caddy can bind ports 80/443..."
              systemctl stop "$svc"
              systemctl disable "$svc" 2>/dev/null || true
            fi
          done

          # If UFW is enabled, allow Caddy (Docker publishes 80/443 on the host).
          if command -v ufw >/dev/null 2>&1 && ufw status 2>/dev/null | grep -q 'Status: active'; then
            echo "UFW is active — ensuring inbound HTTP/HTTPS..."
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw reload || true
          fi

          # CRM Postgres: use tools/docker-compose-cc-prod.sh for ALL compose invocations so the
          # generated Tailscale overlay is never dropped (plain -f docker-compose.yml up removes it).
          COMPOSE="bash tools/docker-compose-cc-prod.sh"

          if [ -f tools/expose-crm-db-tailscale.sh ]; then
            echo "Refresh CRM Tailscale publish (creates/updates overlay; idempotent)..."
            bash tools/expose-crm-db-tailscale.sh || echo "WARN: expose-crm-db-tailscale.sh failed — Tailscale down on server? Re-run after: tailscale up"
          fi

          echo "Building Docker images..."
          $COMPOSE build --no-cache web

          echo "Starting containers..."
          $COMPOSE up -d

          echo "Waiting for CRM Postgres (pgvector + _memory)..."
          for i in $(seq 1 90); do
            if $COMPOSE exec -T crm-db pg_isready -U postgres -d default >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          if ! $COMPOSE exec -T crm-db pg_isready -U postgres -d default >/dev/null 2>&1; then
            echo "ERROR: crm-db did not become ready"
            $COMPOSE logs --tail=40 crm-db
            exit 1
          fi

          echo "Applying idempotent vector memory migration (extension + _memory)..."
          $COMPOSE exec -T crm-db psql -U postgres -d default -v ON_ERROR_STOP=1 \
            < web/scripts/migrate-vector-memory.sql

          echo "Applying idempotent Suzi Intake migration (_intake)..."
          $COMPOSE exec -T crm-db psql -U postgres -d default -v ON_ERROR_STOP=1 \
            < web/scripts/migrate-intake.sql

          echo "Applying idempotent Intake itemNumber (stable card ids)..."
          $COMPOSE exec -T crm-db psql -U postgres -d default -v ON_ERROR_STOP=1 \
            < web/scripts/migrate-intake-item-number.sql

          echo "Applying idempotent punch list actions (JSONB on _punch_list)..."
          $COMPOSE exec -T crm-db psql -U postgres -d default -v ON_ERROR_STOP=1 \
            < web/scripts/migrate-punch-list-actions-jsonb.sql

          echo "Applying idempotent Marni Knowledge Studio (_kb_topic, _agent_knowledge)..."
          $COMPOSE exec -T crm-db psql -U postgres -d default -v ON_ERROR_STOP=1 \
            < web/scripts/migrate-marni-kb.sql

          echo "Applying idempotent LinkedIn inbound receipt dedupe (_linkedin_inbound_receipt)..."
          $COMPOSE exec -T crm-db psql -U postgres -d default -v ON_ERROR_STOP=1 \
            < web/scripts/migrate-linkedin-inbound-receipt.sql

          if [ -f tools/expose-crm-db-tailscale.sh ]; then
            echo "Re-check CRM Postgres on Tailscale (idempotent)..."
            bash tools/expose-crm-db-tailscale.sh || echo "WARN: expose-crm-db-tailscale.sh failed (Tailscale down on server?). Re-run after: tailscale up"
          fi

          echo "Verify tailnet Postgres port (from droplet host)..."
          TS_IP=$(tailscale ip -4 2>/dev/null | head -1 || true)
          if [ -n "$TS_IP" ] && command -v nc >/dev/null 2>&1; then
            if nc -z -w 5 "$TS_IP" 5432 2>/dev/null; then
              echo "OK: $TS_IP:5432 accepts TCP — laptop LOCALPROD / tailnet CRM should work."
            else
              echo "WARN: $TS_IP:5432 closed from host — run: cd /opt/agent-tim && bash tools/expose-crm-db-tailscale.sh"
            fi
          fi

          echo "Waiting for server to start..."
          sleep 8
          EOF

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} bash -s <<'EOF'
          cd /opt/agent-tim
          COMPOSE="bash tools/docker-compose-cc-prod.sh"
          if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
            echo "✓ Health check passed — Command Central is running."
          else
            echo "✗ Health check FAILED"
            echo ""
            echo "Container logs:"
            $COMPOSE logs --tail=30 web
            exit 1
          fi
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
