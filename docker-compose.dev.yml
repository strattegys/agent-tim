# Local development stack
# Usage: docker compose -f docker-compose.dev.yml up
#
# Hot reload works via volume mount of web/ directory.
# Runs on http://localhost:3001

services:
  web:
    image: node:20-alpine
    working_dir: /app
    # --webpack: Turbopack (Next 16 default) often misses file changes on Windows + bind mounts; webpack + polling below is reliable
    command: sh -c "npm install && rm -rf .next && npx next dev --hostname 0.0.0.0 --port 3001 --webpack"
    ports:
      - "3001:3001"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - ./agents:/agents
    env_file: ./web/.env.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AGENT_ROOT=/agents
      - CRM_DB_HOST=host.docker.internal
      # Windows + bind mounts: file watchers often miss saves; force polling so edits hit Next dev
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    tty: true

volumes:
  web_node_modules:
