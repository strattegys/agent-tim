# Local development stack — Docker Desktop project **cc-localdev**; container name includes **3010** so the port is visible in the UI (mapping is still 3010:3010).
#
# **Default data platform:** CRM Postgres service **crm-db** in this file (same pgvector image as production).
# No Tailscale/SSH — web uses CRM_DB_HOST=crm-db. Run with:
#   docker compose --env-file web/.env.local -f docker-compose.dev.yml up -d
#   or:  .\scripts\dev-docker-up.ps1
# First-time DB volume is empty (only `vector` ext from docker/crm-db-init) until you pg_restore a backup
# or run migrations; Kanban needs the workspace schema from a real Twenty/CRM dump or use LOCALPROD Docker for a full local copy.
#
# **Remote droplet CRM (optional):** scripts/dev-docker-up.ps1 -UseRemoteCrm (+ tunnel/bridge) and docker-compose.dev-remote-crm.yml.
# **Direct tailnet from container:** set CC_DOCKER_CRM_DB_HOST / CC_DOCKER_CRM_DB_PORT when running compose.
#
# Host access (pg_restore / db:exec / Cursor terminal): 127.0.0.1:25432 — same CRM_DB_PASSWORD as .env.local.
# If .env.local still says CRM_DB_HOST=crm-db, host-side scripts remap crm-db → 127.0.0.1:25432 automatically (crm-db-pool.mjs).
# Verify DB:  docker compose --env-file web/.env.local -f docker-compose.dev.yml exec web npm run check-crm-db
## Hot reload works via volume mount of web/ directory.
# LOCALDEV: http://localhost:3010 — use this host in the browser (not 127.0.0.1). Compose sets AUTH_URL /
# NEXTAUTH_URL and NEXT_PUBLIC_CC_RUNTIME_LABEL=LOCALDEV. For LOCALPROD in Docker see docker-compose.local-prod-desktop.yml.
#
# Optional: add web/.env.development.local (gitignored) — Next dev loads it over .env.local so you can
# experiment without overwriting your stable baseline. See docs/LOCAL-ENV-LAYERS.md.

name: cc-localdev

services:
  crm-db:
    container_name: cc-localdev-crm-db
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CRM_DB_USER:-postgres}
      POSTGRES_DB: ${CRM_DB_NAME:-default}
      POSTGRES_PASSWORD: "${CRM_DB_PASSWORD:?Set CRM_DB_PASSWORD in web/.env.local. Run: docker compose --env-file web/.env.local -f docker-compose.dev.yml up}"
    volumes:
      - cc_localdev_crm_data:/var/lib/postgresql/data
      - ./docker/crm-db-init:/docker-entrypoint-initdb.d:ro
    # Optional loopback publish for host tools (pg_restore, `npm run db:exec` from web/ on Windows): 127.0.0.1:25432
    ports:
      - "127.0.0.1:25432:5432"
    # Soft cap ~1 GiB so dev Postgres does not crowd out Node; Docker Desktop honors deploy on local compose.
    deploy:
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CRM_DB_USER:-postgres} -d ${CRM_DB_NAME:-default}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

  web:
    container_name: cc-localdev-p3010
    image: node:20-alpine
    labels:
      - cc.localdev.port=3010
      - cc.localdev.url=http://localhost:3010
    working_dir: /app
    # --webpack: Turbopack (Next 16 default) often misses file changes on Windows + bind mounts; webpack + polling below is reliable
    # Do not chain `rm -rf .next &&` here: on Windows + bind mounts, deleting .next often fails (EPERM/EBUSY) and then next dev never starts.
    # Clear cache when needed: stop the container, delete web/.next on the host, or: docker compose -f docker-compose.dev.yml run --rm web sh -c "rm -rf .next"
    command: sh -c "npm install && npx next dev --hostname 0.0.0.0 --port 3010 --webpack"
    ports:
      - "3010:3010"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - ./agents:/agents
      # Same as production docker-compose.yml: uploads survive container restarts (host ./docker-data/agent-avatars)
      - ./docker-data/agent-avatars:/data/agent-avatars
    # Baseline secrets: web/.env.local. Optional dev overrides: web/.env.development.local (Next dev only).
    # Next only reads env at process start. New/changed keys need a recreated container: docker compose -f docker-compose.dev.yml up -d --no-deps --force-recreate web
    env_file: ./web/.env.local
    depends_on:
      crm-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AGENT_ROOT=/agents
      - AVATAR_DIR=/data/agent-avatars
      # Auth.js: must match the origin you type in the browser or API fetch cookies break (Marni KB, etc.).
      # These override NEXTAUTH_URL / AUTH_URL from env_file when .env.local is copied from production.
      - AUTH_URL=http://localhost:3010
      - NEXTAUTH_URL=http://localhost:3010
      - NEXT_PUBLIC_CC_RUNTIME_LABEL=LOCALDEV
      # Isolate chat JSONL + on-disk memory from LOCALPROD / droplet paths (see web/lib/agent-config.ts).
      - CC_AGENT_CHAT_PROFILE=localdev
      # Full app shell in Docker dev even if web/.env.local copies droplet settings (CC_PUBLIC_APP_UI=backend).
      - CC_PUBLIC_APP_UI=true
      # Same as web default (openai/gpt-oss-120b); explicit so Docker dev matches agent-registry without relying on omitting env
      - GROQ_CHAT_MODEL=openai/gpt-oss-120b
      # Default: bundled **crm-db** in this stack. Remote: docker-compose.dev-remote-crm.yml or CC_DOCKER_CRM_*.
      - CRM_DB_HOST=${CC_DOCKER_CRM_DB_HOST:-crm-db}
      - CRM_DB_PORT=${CC_DOCKER_CRM_DB_PORT:-5432}
      # Windows + bind mounts: file watchers often miss saves; force polling so edits hit Next dev
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    tty: true

volumes:
  web_node_modules:
  cc_localdev_crm_data:
