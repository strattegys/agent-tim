# Local-only overlay: LOCALPROD Docker stack on your PC.
# Do NOT use on the droplet — production uses docker-compose.yml only.
#
# CRM data is the **same Command Central Postgres as production** (DigitalOcean droplet).
#
# **Default (Tailscale direct — no bridge/tunnel):** Docker Desktop can route to Tailscale
# IPs, so the container connects straight to 100.74.54.12:5432 (CC droplet crm-db exposed on
# its Tailscale address via tools/expose-crm-db-tailscale.sh). Requires Tailscale running on
# your PC and the expose script applied on the server (deploy-web.yml does this automatically).
#
# **Fallback (bridge/tunnel):** If Docker cannot reach the Tailscale IP, set in **shell** or
# COMMAND-CENTRAL/.env (not web/.env.local): CC_LOCALPROD_CRM_HOST=host.docker.internal CC_LOCALPROD_CRM_PORT=5433
# — `docker compose --env-file web/.env.local` uses that file for interpolation; putting
# CRM_LOCALPROD_DB_HOST=127.0.0.1 in web/.env.local (meant for host npm tools) wrongly injects it into the container.
# Then run scripts/localprod-crm-tunnel.ps1 before starting.
#
# The bundled **crm-db** service from docker-compose.yml is **not started** here: we assign it profile
# `bundled-crm-postgres` so only `web` + `caddy` run. No local Postgres container, no stub — you are
# always pointed at the droplet's database (see CRM_DB_HOST / CRM_DB_PORT below).
# To run a **local** Compose Postgres instead (rare): `docker compose ... --profile bundled-crm-postgres up`
# and point CRM_DB_HOST at `crm-db` in .env.local (not the default LOCALPROD flow).
#
#   docker compose --env-file web/.env.local -f docker-compose.yml -f docker-compose.local-prod-desktop.yml up -d --build
#
name: cc-localprod

services:
  web:
    container_name: cc-localprod-p3001
    ports:
      - "3001:3001"
    build:
      args:
        NEXT_PUBLIC_CC_RUNTIME_LABEL: LOCALPROD
    labels:
      - cc.localprod.port=3001
      - cc.localprod.url=http://localhost:3001
    # Use mapping form so CC_AGENT_CHAT_PROFILE is really empty. List form `- CC_AGENT_CHAT_PROFILE=`
    # can inherit the **host** variable on Windows (e.g. localprod) and hide all canonical session files.
    environment:
      CC_AGENT_CHAT_PROFILE: ""
      # Must not be HOSTED — db.ts would force crm-db; this stack uses Tailscale/tunnel CRM on the droplet.
      CC_RUNTIME_STACK: LOCALPROD
      AUTH_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3001
      # Friday → Observation Post + /api/dev/observability* (NODE_ENV=production in this stack)
      OBSERVATION_POST_API: "1"
      # Direct Tailscale: droplet CRM on tailnet. Prefer CC_LOCALPROD_CRM_* (shell / repo .env) so
      # web/.env.local is safe to pass as compose --env-file without 127.0.0.1 tunnel hints.
      CRM_DB_HOST: ${CC_LOCALPROD_CRM_HOST:-${CRM_LOCALPROD_DB_HOST:-100.74.54.12}}
      CRM_DB_PORT: ${CC_LOCALPROD_CRM_PORT:-${CRM_LOCALPROD_DB_PORT:-5432}}
    # CRM is on the droplet via Tailscale — clear base `depends_on: crm-db` (merge would keep it otherwise).
    depends_on: !reset []

  crm-db:
    profiles:
      - bundled-crm-postgres

  caddy:
    container_name: cc-localprod-caddy
